version: '3.8'

services:
  # Cinacoin Demo App (Next.js)
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_PROJECT_ID=${NEXT_PUBLIC_PROJECT_ID:-demo-project-id}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
    depends_on:
      relay:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Cinacoin Relay Server (Rust / distroless)
  relay:
    build:
      context: .
      dockerfile: deploy/docker/relay-server/Dockerfile
    ports:
      - "5555:8080"
    environment:
      - RUST_LOG=info,relay=debug
      - NATS_URL=nats://nats-cluster:4222
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["/app/relay-server", "--health-check"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # RPC Proxy (Go / scratch)
  rpc-proxy:
    build:
      context: .
      dockerfile: deploy/docker/rpc-proxy/Dockerfile
    ports:
      - "8545:8545"
    environment:
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}
    restart: unless-stopped
    healthcheck:
      test: ["/rpc-proxy", "-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Keys Server (Rust / distroless)
  keys-server:
    build:
      context: ./packages/keys-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["/app/keys-server", "--health-check"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cinacoin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  redis_data:
  pg_data:
