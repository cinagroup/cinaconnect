version: '3.8'

services:
  # Cinacoin Demo App (Next.js)
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_PROJECT_ID=${NEXT_PUBLIC_PROJECT_ID:-demo-project-id}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
    depends_on:
      - relay
      - redis

  # Cinacoin Relay Server (self-built)
  relay:
    build:
      context: .
      dockerfile: deploy/docker/relay-server/Dockerfile
    ports:
      - "5555:8080"
    environment:
      - RUST_LOG=info,relay=debug
      - NATS_URL=nats://nats-cluster:4222
    depends_on:
      - redis

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # RPC Proxy (self-hosted)
  rpc-proxy:
    build:
      context: .
      dockerfile: deploy/docker/rpc-proxy/Dockerfile
    ports:
      - "8545:8545"
    environment:
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL}

  # Keys Server (for key management)
  keys-server:
    build:
      context: ./packages/keys-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      - db

  # Database
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
