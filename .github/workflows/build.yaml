name: Build

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cinacoin
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Rust: Relay Server ───────────────────────────────────────
  rust-relay:
    name: Rust — Relay Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-relay-${{ hashFiles('relay-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-relay-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: relay-server/target
          key: ${{ runner.os }}-target-relay-${{ hashFiles('relay-server/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./relay-server
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./relay-server
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./relay-server
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./relay-server
        run: cargo build --release

  # ── Rust: Bundler ────────────────────────────────────────────
  rust-bundler:
    name: Rust — Bundler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bundler-${{ hashFiles('packages/bundler/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bundler-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: packages/bundler/target
          key: ${{ runner.os }}-target-bundler-${{ hashFiles('packages/bundler/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./packages/bundler
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./packages/bundler
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./packages/bundler
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./packages/bundler
        run: cargo build --release

  # ── Rust: Push Server ────────────────────────────────────────
  rust-push-server:
    name: Rust — Push Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-push-${{ hashFiles('packages/push-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-push-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: packages/push-server/target
          key: ${{ runner.os }}-target-push-${{ hashFiles('packages/push-server/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./packages/push-server
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./packages/push-server
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./packages/push-server
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./packages/push-server
        run: cargo build --release

  # ── Rust: Keys Server ────────────────────────────────────────
  rust-keys-server:
    name: Rust — Keys Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-keys-${{ hashFiles('packages/keys-server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-keys-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: packages/keys-server/target
          key: ${{ runner.os }}-target-keys-${{ hashFiles('packages/keys-server/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./packages/keys-server
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./packages/keys-server
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./packages/keys-server
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./packages/keys-server
        run: cargo build --release

  # ── Rust: ERC-6492 ───────────────────────────────────────────
  rust-erc6492:
    name: Rust — ERC-6492
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-erc6492-${{ hashFiles('packages/erc6492/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-erc6492-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: packages/erc6492/target
          key: ${{ runner.os }}-target-erc6492-${{ hashFiles('packages/erc6492/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./packages/erc6492
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: ./packages/erc6492
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: ./packages/erc6492
        run: cargo test --workspace --all-features

      - name: Build
        working-directory: ./packages/erc6492
        run: cargo build --release

  # ── Go: RPC Proxy ────────────────────────────────────────────
  go-build:
    name: Go — RPC Proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ./rpc-proxy/go.sum

      - name: Download dependencies
        working-directory: ./rpc-proxy
        run: go mod download

      - name: Vet
        working-directory: ./rpc-proxy
        run: go vet ./...

      - name: Run tests
        working-directory: ./rpc-proxy
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./rpc-proxy/coverage.out

      - name: Build
        working-directory: ./rpc-proxy
        run: go build -ldflags="-s -w" -o bin/rpc-proxy ./cmd/rpc-proxy

  # ── TypeScript: SDK + UI ─────────────────────────────────────
  ts-compile:
    name: TypeScript — SDK + UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (all packages)
        run: pnpm -r --parallel exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Run vitest
        run: pnpm vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info

  # ── Docker Build & Push ──────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: [rust-relay, rust-bundler, rust-push-server, rust-keys-server, rust-erc6492, go-build, ts-compile]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: relay-server
            dockerfile: deploy/docker/relay-server/Dockerfile
            context: .
          - name: rpc-proxy
            dockerfile: deploy/docker/rpc-proxy/Dockerfile
            context: .
          - name: bundler
            dockerfile: deploy/docker/bundler/Dockerfile
            context: .
          - name: core-ui
            dockerfile: deploy/docker/core-ui/Dockerfile
            context: .
          - name: push-server
            dockerfile: packages/push-server/Dockerfile
            context: packages/push-server
          - name: keys-server
            dockerfile: packages/keys-server/Dockerfile
            context: packages/keys-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        id: build
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Load image for Trivy scan
        if: github.event_name == 'pull_request'
        run: |
          docker build -t ${{ matrix.service.name }}:test \
            -f ${{ matrix.service.dockerfile }} ${{ matrix.service.context }}

      - name: Run Trivy vulnerability scanner
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.name }}:test
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload Trivy SARIF report
        if: always() && github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service.name }}:test
          format: sarif
          output: trivy-results-${{ matrix.service.name }}.sarif

      - name: Upload SARIF to GitHub
        if: always() && github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.service.name }}.sarif

  # ── Security: npm audit + cargo audit ───────────────────────
  security-scan:
    name: Security Scan — npm audit + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── npm audit ──
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: npm audit
        run: pnpm audit --audit-level=moderate || true

      # ── cargo audit ──
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit relay-server
        working-directory: ./relay-server
        run: cargo audit || true

      - name: Audit bundler
        working-directory: ./packages/bundler
        run: cargo audit || true

      - name: Audit push-server
        working-directory: ./packages/push-server
        run: cargo audit || true

      - name: Audit keys-server
        working-directory: ./packages/keys-server
        run: cargo audit || true
