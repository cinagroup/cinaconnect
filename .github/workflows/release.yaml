name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: Semantic Release
        id: semver
        run: |
          npx semantic-release --branches main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  changelog:
    name: Generate Changelog
    needs: release
    runs-on: ubuntu-latest
    if: ${{ needs.release.outputs.version != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          echo "# Release v${VERSION}" > CHANGELOG-v${VERSION}.md
          echo "" >> CHANGELOG-v${VERSION}.md
          echo "Released at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> CHANGELOG-v${VERSION}.md
          echo "" >> CHANGELOG-v${VERSION}.md
          echo "## Changes" >> CHANGELOG-v${VERSION}.md
          echo "" >> CHANGELOG-v${VERSION}.md
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG-v${VERSION}.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v7
        with:
          name: changelog
          path: CHANGELOG-*.md
