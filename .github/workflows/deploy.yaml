name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      canary_traffic_pct:
        description: "Canary traffic percentage (staging skip for production)"
        required: false
        default: "10"
        type: string

env:
  HELM_VERSION: "3.14.0"
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: cinacoin

jobs:
  # ── Build & Push Images ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.canary_traffic_pct != '' && 'dispatch' || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push relay-server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/relay-server/Dockerfile
          push: true
          tags: |
            ghcr.io/cinacoin/relay-server:${{ steps.version.outputs.version }}
            ghcr.io/cinacoin/relay-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push rpc-proxy
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/rpc-proxy/Dockerfile
          push: true
          tags: |
            ghcr.io/cinacoin/rpc-proxy:${{ steps.version.outputs.version }}
            ghcr.io/cinacoin/rpc-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push bundler
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/bundler/Dockerfile
          push: true
          tags: |
            ghcr.io/cinacoin/bundler:${{ steps.version.outputs.version }}
            ghcr.io/cinacoin/bundler:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push push-server
        uses: docker/build-push-action@v7
        with:
          context: ./packages/push-server
          file: packages/push-server/Dockerfile
          push: true
          tags: |
            ghcr.io/cinacoin/push-server:${{ steps.version.outputs.version }}
            ghcr.io/cinacoin/push-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push keys-server
        uses: docker/build-push-action@v7
        with:
          context: ./packages/keys-server
          file: packages/keys-server/Dockerfile
          push: true
          tags: |
            ghcr.io/cinacoin/keys-server:${{ steps.version.outputs.version }}
            ghcr.io/cinacoin/keys-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Staging Deploy ───────────────────────────────────────────
  deploy-staging:
    needs: build
    if: github.ref_type == 'tag' || github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubeconfig
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.28.0"

      - name: Configure staging kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Deploy to staging
        run: |
          helm upgrade --install cinacoin ./deploy/helm/cinacoin \
            --namespace staging \
            --create-namespace \
            --set global.environment=staging \
            --set global.region=${{ secrets.STAGING_REGION }} \
            --set relay.image.tag=${{ steps.version.outputs.version }} \
            --set rpcProxy.image.tag=${{ steps.version.outputs.version }} \
            --set bundler.image.tag=${{ steps.version.outputs.version }} \
            --set pushServer.image.tag=${{ steps.version.outputs.version }} \
            --set keysServer.image.tag=${{ steps.version.outputs.version }} \
            --wait --timeout 10m \
            --atomic

      - name: Verify staging rollout
        run: |
          echo "Waiting for all deployments to stabilize..."
          kubectl rollout status deployment/relay-server -n staging --timeout=300s
          kubectl rollout status deployment/rpc-proxy -n staging --timeout=300s
          kubectl rollout status deployment/bundler -n staging --timeout=300s
          kubectl rollout status deployment/push-server -n staging --timeout=300s
          kubectl rollout status deployment/keys-server -n staging --timeout=300s

      - name: Health check — staging
        run: |
          echo "Running health checks against staging endpoints..."

          RELAY_URL=$(kubectl get svc relay-server -n staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          RPC_URL=$(kubectl get svc rpc-proxy -n staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Relay health
          curl -sf "http://${RELAY_URL}:8080/v1/health" || exit 1
          echo "✓ relay-server healthy"

          # RPC health
          curl -sf "http://${RPC_URL}:8545/health" || exit 1
          echo "✓ rpc-proxy healthy"

          # Bundler health
          curl -sf "http://bundler:4337/health" -n || echo "⚠ bundler health check skipped (internal)"

          echo "All staging health checks passed"

      - name: Smoke test — basic functionality
        run: |
          echo "Running basic smoke tests..."
          # Verify pod counts match expected replicas
          RELAY_PODS=$(kubectl get pods -n staging -l app.kubernetes.io/name=relay --field-selector=status.phase=Running --no-headers | wc -l)
          RPC_PODS=$(kubectl get pods -n staging -l app.kubernetes.io/name=rpc-proxy --field-selector=status.phase=Running --no-headers | wc -l)

          echo "Relay pods running: $RELAY_PODS"
          echo "RPC pods running: $RPC_PODS"

          if [ "$RELAY_PODS" -lt 2 ] || [ "$RPC_PODS" -lt 2 ]; then
            echo "✗ Insufficient running pods"
            exit 1
          fi

          echo "✓ Smoke tests passed"

  # ── Production Deploy (Canary) ───────────────────────────────
  deploy-production:
    needs: deploy-staging
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set up kubeconfig
        uses: azure/setup-kubectl@v5
        with:
          version: "v1.28.0"

      - name: Configure production kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v${{ env.HELM_VERSION }}

      - name: Canary deployment (10% traffic)
        run: |
          echo "Starting canary deployment with 10% traffic..."
          helm upgrade --install cinacoin-canary ./deploy/helm/cinacoin \
            --namespace production \
            --set global.environment=production \
            --set global.region=${{ secrets.PRODUCTION_REGION }} \
            --set relay.image.tag=${{ steps.version.outputs.version }} \
            --set rpcProxy.image.tag=${{ steps.version.outputs.version }} \
            --set bundler.image.tag=${{ steps.version.outputs.version }} \
            --set pushServer.image.tag=${{ steps.version.outputs.version }} \
            --set keysServer.image.tag=${{ steps.version.outputs.version }} \
            --set relay.replicaCount=1 \
            --set rpcProxy.replicaCount=1 \
            --set bundler.replicaCount=1 \
            --set pushServer.replicaCount=1 \
            --set keysServer.replicaCount=1 \
            --wait --timeout 10m \
            --atomic

      - name: Canary verification
        run: |
          echo "Waiting 15 minutes to observe canary metrics..."
          sleep 900

          # Check error rates via Prometheus
          ERROR_RATE=$(curl -s "http://${{ secrets.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=sum(rate(rpc_requests_total{status="error"}[5m])) / sum(rate(rpc_requests_total[5m]))')

          echo "Error rate response: $ERROR_RATE"

          # Extract value and validate
          VALUE=$(echo "$ERROR_RATE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              val = float(d['data']['result'][0]['value'][1])
              print(val)
          except:
              print(0.0)
          ")

          echo "Error rate: $VALUE"

          if python3 -c "import sys; sys.exit(0 if float('$VALUE') < 0.01 else 1)"; then
            echo "✓ Canary passed: error rate ($VALUE) within 1% threshold"
          else
            echo "✗ Canary failed: error rate ($VALUE) exceeds 1% threshold, rolling back"
            helm rollback cinacoin --namespace production
            kubectl delete deployment cinacoin-canary-relay-server cinacoin-canary-rpc-proxy cinacoin-canary-bundler cinacoin-canary-push-server cinacoin-canary-keys-server -n production --ignore-not-found
            exit 1
          fi

          # Verify no crash loops
          CRASHED=$(kubectl get pods -n production -l app.kubernetes.io/instance=cinacoin-canary --field-selector=status.phase=Running --no-headers | grep -c "CrashLoopBackOff" || true)
          if [ "$CRASHED" -gt 0 ]; then
            echo "✗ Canary pods in CrashLoopBackOff, rolling back"
            helm rollback cinacoin --namespace production
            exit 1
          fi
          echo "✓ No crash loops detected"

      - name: Full production rollout
        run: |
          echo "Promoting canary to full production..."
          helm upgrade --install cinacoin ./deploy/helm/cinacoin \
            --namespace production \
            --set global.environment=production \
            --set global.region=${{ secrets.PRODUCTION_REGION }} \
            --set relay.image.tag=${{ steps.version.outputs.version }} \
            --set rpcProxy.image.tag=${{ steps.version.outputs.version }} \
            --set bundler.image.tag=${{ steps.version.outputs.version }} \
            --set pushServer.image.tag=${{ steps.version.outputs.version }} \
            --set keysServer.image.tag=${{ steps.version.outputs.version }} \
            --wait --timeout 15m \
            --atomic

      - name: Verify production rollout
        run: |
          echo "Verifying production rollout..."
          kubectl rollout status deployment/relay-server -n production --timeout=600s
          kubectl rollout status deployment/rpc-proxy -n production --timeout=600s
          kubectl rollout status deployment/bundler -n production --timeout=600s
          kubectl rollout status deployment/push-server -n production --timeout=600s
          kubectl rollout status deployment/keys-server -n production --timeout=600s

          echo "All production deployments verified"

      - name: Cleanup canary
        if: always()
        run: |
          echo "Cleaning up canary deployment..."
          helm uninstall cinacoin-canary --namespace production --wait --timeout 5m || true
          echo "✓ Canary cleanup complete"

      - name: Post-deployment notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              --data '{"text":"✅ Cinacoin v${{ steps.version.outputs.version }} deployed to production successfully"}'
          else
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              --data '{"text":"❌ Cinacoin v${{ steps.version.outputs.version }} production deployment failed"}'
          fi
