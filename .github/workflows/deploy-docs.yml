name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    branches:
      - main
    paths:
      - "docs-site/**"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  # ── Build & Preview ──────────────────────────────────────────
  build:
    name: Build VitePress Docs
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.verify.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build VitePress site
        working-directory: docs-site
        run: npm run build
        env:
          # Ensure absolute URLs work in production
          VITEPRESS_BASE: "/"

      - name: Verify build output
        id: verify
        working-directory: docs-site
        run: |
          echo "Checking build output..."
          if [ -d "docs/.vitepress/dist" ]; then
            echo "✓ Build output found at docs/.vitepress/dist"
            echo "Total size: $(du -sh docs/.vitepress/dist | cut -f1)"
            echo "Files: $(find docs/.vitepress/dist -type f | wc -l)"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Build output not found"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy to Cloudflare Pages ───────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://cinacoin-docs.pages.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build VitePress site
        working-directory: docs-site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy docs-site/docs/.vitepress/dist
            --project-name=cinacoin-docs
            --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        run: |
          echo "## 📚 Docs Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Cloudflare Pages" >> $GITHUB_STEP_SUMMARY
