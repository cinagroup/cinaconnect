name: Deploy VitePress Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'packages/**/*.ts'
      - 'package.json'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── TypeDoc: generate API docs from source ─────────────────
  typedoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-docs-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-docs-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate TypeDoc
        run: npx typedoc

      - name: Upload typedoc output
        uses: actions/upload-artifact@v7
        with:
          name: typedoc-output
          path: docs/.vitepress/dist/api/typedoc/
          retention-days: 1

  # ── Build VitePress site ────────────────────────────────────
  build:
    needs: typedoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-docs-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-docs-

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Restore TypeDoc output
        uses: actions/download-artifact@v8
        with:
          name: typedoc-output
          path: docs/public/api/typedoc/

      - name: Build VitePress
        run: npx vitepress build docs
        env:
          NODE_ENV: production

      - name: Add custom domain (CNAME)
        if: ${{ vars.DOCS_CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.DOCS_CUSTOM_DOMAIN }}" > docs/.vitepress/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  # ── Deploy to GitHub Pages ──────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployment
        run: |
          echo "Docs deployed to: ${{ steps.deployment.outputs.page_url }}"
          if [ -n "${{ vars.DOCS_CUSTOM_DOMAIN }}" ]; then
            echo "Custom domain: ${{ vars.DOCS_CUSTOM_DOMAIN }}"
            # Verify DNS is resolving
            curl -sI --max-time 10 "https://${{ vars.DOCS_CUSTOM_DOMAIN }}" || echo "⚠ Custom domain not yet resolving"
          fi
