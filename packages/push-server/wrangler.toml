name = "cinaconnect-push-server"
main = "cloudflare/worker.ts"
compatibility_date = "2024-01-01"

[vars]
LOG_LEVEL = "info"
MAX_QUEUE_SIZE = "1000"
DEFAULT_RETRY_ATTEMPTS = "3"
DEFAULT_TIMEOUT_MS = "5000"

[[kv_namespaces]]
binding = "DEVICE_TOKENS"
id = "e4c457a74fdf465dada283af98a4a992"

routes = [
  { pattern = "push.cinacoin.com", custom_domain = true }
]
