name = "cinacoin-push-server"
main = "cloudflare/worker.ts"
compatibility_date = "2024-01-01"
workers_dev = true

routes = [
  { pattern = "push.cinacoin.com/*", zone_name = "cinacoin.com" }
]

[vars]
LOG_LEVEL = "info"
MAX_QUEUE_SIZE = "1000"
DEFAULT_RETRY_ATTEMPTS = "3"
DEFAULT_TIMEOUT_MS = "5000"

[[kv_namespaces]]
binding = "DEVICE_TOKENS"
id = "204742307b054327a9d303af3e9b7d65"

[[d1_databases]]
binding = "PUSH_LOG_DB"
database_name = "cinacoin-push"
database_id = "4c889c2b-91d5-4ef5-9cd6-6c5d7799bf64"
