name = "cinacoin-rpc-proxy"
main = "worker.ts"
compatibility_date = "2025-01-01"
account_id = "7ea8e46d8210bad342fa7595f7935fea"

# ── Production Security ──────────────────────────────────────
[vars]
NODE_ENV = "production"
LOG_LEVEL = "warn"
CACHE_TTL = 300
MAX_RETRIES = "3"
REQUEST_TIMEOUT_MS = "30000"

# ── Rate Limiting (Cloudflare Rate Limiting API) ─────────────
# Requires: wrangler ratelimit create
# Reference: CF_RATE_LIMIT_TOKEN must be set as secret
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "10001"
simple = { limit = 100, period = 60 }

# ── KV Namespaces ───────────────────────────────────────────
[[kv_namespaces]]
binding = "RPC_CACHE"
id = "your-kv-cache-id"

# ── D1 Database ─────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "cinacoin-rpc-cache"
database_id = "your-d1-database-id"

# ── Analytics ───────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 0.1

# ── Security Headers ────────────────────────────────────────
[headers]
"X-Content-Type-Options" = "nosniff"
"X-Frame-Options" = "DENY"
"X-XSS-Protection" = "1; mode=block"
"Strict-Transport-Security" = "max-age=31536000; includeSubDomains"
"Content-Security-Policy" = "default-src 'self'"
"Referrer-Policy" = "strict-origin-when-cross-origin"
