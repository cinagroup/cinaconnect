# Cinacoin CDN — Cloudflare Pages Deployment
# Deploy the built CDN bundle to Cloudflare Pages for versioned, cached hosting.

name = "cinacoin-cdn"
pages_build_output_dir = "cdn-dist"
compatibility_date = "2024-12-01"

[vars]
CDN_VERSION = "0.2.0"
CACHE_MAX_AGE = "31536000"  # 1 year for versioned, 0 for latest
