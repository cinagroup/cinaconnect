name = "cinaconnect-relay-server"
main = "cloudflare/worker.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "RELAY_SESSION", class_name = "RelaySession" }
]

[[migrations]]
tag = "v1"
new_classes = ["RelaySession"]

[[kv_namespaces]]
binding = "RELAY_CACHE"
id = "PLACEHOLDER_REPLACE_AFTER_CREATE"

[vars]
RELAY_URL = "wss://relay.walletconnect.com"
