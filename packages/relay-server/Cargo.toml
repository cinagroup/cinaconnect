[package]
name = "cinacoin-relay-server"
version = "0.1.0"
edition = "2021"
description = "WebSocket relay server for Cinacoin"

[dependencies]
actix-web = { version = "4", features = ["openssl"] }
actix-web-actors = "4"
actix-tls = { version = "3", features = ["openssl"] }
actix = "0.13"
openssl = "0.10"
tokio = { version = "1", features = ["full"] }
async-nats = "0.36"
redis = { version = "0.26", features = ["tokio-comp", "connection-manager", "aio"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
prometheus = "0.13"
lazy_static = "1"
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
sha2 = "0.10"
base64 = "0.22"
hex = "0.4"
rand = "0.8"
futures-util = "0.3"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "json", "uuid"] }
