name = "cinacoin-notify-server"
main = "cloudflare/worker.ts"
compatibility_date = "2024-01-01"

[vars]
LOG_LEVEL = "info"
MAX_SUBSCRIPTIONS_PER_USER = "100"
DEFAULT_RETENTION_DAYS = "30"

# Secrets (set with: wrangler secret put <name>)
# DATABASE_URL - for persistent storage (optional)
# WEBHOOK_SECRET - for webhook verification
# FCM_API_KEY - for Firebase Cloud Messaging
# EMAIL_API_KEY - for email service (SendGrid/Resend)

# Rate limiting
[limits]
cpu_ms = 50

# KV namespace for subscription cache (optional)
[[kv_namespaces]]
binding = "SUBSCRIPTION_CACHE"
id = "ab72802bc80c49e3955a710820ce4506"

# D1 database for persistent subscriptions (optional)
[[d1_databases]]
binding = "SUBSCRIPTION_DB"
database_name = "cinacoin-notifications"
database_id = "PLACEHOLDER_REPLACE_AFTER_CREATE"