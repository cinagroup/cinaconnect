name = "cinacoin-notify-server"
main = "worker.ts"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "notify.cinacoin.com/*", zone_name = "cinacoin.com" }
]

[vars]
LOG_LEVEL = "info"
MAX_SUBSCRIPTIONS_PER_USER = "100"
DEFAULT_RETENTION_DAYS = "30"

[[kv_namespaces]]
binding = "SUBSCRIPTION_CACHE"
id = "5a37e75019bb41a2a55b34b631650cca"

[[d1_databases]]
binding = "SUBSCRIPTION_DB"
database_name = "cinacoin-notifications"
database_id = "fa614bc3-dc8c-44cd-a6b4-976158614203"
