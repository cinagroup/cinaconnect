name = "cinacoin-analytics"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Production environment
[env.production]
name = "cinacoin-analytics-prod"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "CinacoinAnalytics"
database_id = "YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

# KV for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_NAMESPACE_ID"

# KV for deduplication
[[kv_namespaces]]
binding = "DEDUP_KV"
id = "YOUR_DEDUP_KV_ID"
preview_id = "YOUR_DEDUP_KV_ID"

[vars]
API_KEY = ""
RATE_LIMIT = "1000"
RATE_WINDOW = "3600"
BATCH_SIZE = "100"
GDPR_ANONYMIZE = "true"
