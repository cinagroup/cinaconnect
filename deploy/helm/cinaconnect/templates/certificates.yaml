# TLS Certificate Management — internal service-to-service encryption
# Uses cert-manager with a self-signed CA for internal certificates
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cinaconnect-ca
  labels:
    {{- include "cinaconnect.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cinaconnect-ca-cert
  namespace: cert-manager
spec:
  isCA: true
  commonName: cinaconnect-ca
  secretName: cinaconnect-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: cinaconnect-ca
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cinaconnect-ca-issuer
spec:
  ca:
    secretName: cinaconnect-ca-secret
---
# Internal certificate for service mesh communication
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cinaconnect-internal-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: cinaconnect-internal-tls
  issuerRef:
    name: cinaconnect-ca-issuer
    kind: ClusterIssuer
  commonName: "*.cinaconnect.svc.cluster.local"
  dnsNames:
    - "*.cinaconnect.svc.cluster.local"
    - "*.cinaconnect.svc"
    - "*.cinaconnect"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
