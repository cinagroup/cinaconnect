# Cinacoin — Helm Values
# ────────────────────────────────────────────────────────────────────

global:
  environment: production
  region: us-east-1
  imageRegistry: ghcr.io/cinacoin
  imagePullSecrets: []
  commonLabels:
    managed-by: helm
    project: cinacoin

# ── Relay Server ──────────────────────────────────────────────────
relay:
  replicaCount: 3
  image:
    repository: relay-server
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  ports:
    ws: 8080
    http: 8081
    metrics: 9090
  env:
    RUST_LOG: "info,relay=debug"
    NATS_URL: "nats://nats-cluster:4222"
  envFromSecrets:
    - name: redis-credentials
      keys: [url]
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    className: nginx
    host: relay.cinacoin.com
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    tls:
      enabled: true
      secretName: relay-tls
  topologySpread:
    maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
  podAntiAffinity:
    weight: 100
    topologyKey: kubernetes.io/hostname
  livenessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ── RPC Proxy ─────────────────────────────────────────────────────
rpcProxy:
  replicaCount: 3
  image:
    repository: rpc-proxy
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "2000m"
      memory: "1Gi"
  ports:
    http: 8545
    metrics: 9090
  env:
    REDIS_URL: "redis://redis-cluster:6379"
    PROVIDERS_FILE: "/config/providers.yaml"
  envFromSecrets:
    - name: provider-api-keys
      keys: [alchemy, infura, ankr]
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilization: 65
  service:
    type: ClusterIP
    port: 8545
  livenessProbe:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ── NATS JetStream ────────────────────────────────────────────────
nats:
  cluster:
    replicas: 3
    image:
      repository: nats
      tag: "2.10-alpine"
  jetstream:
    enabled: true
    memory: "4Gi"
    file: "20Gi"
    storageClass: gp3
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "8Gi"
  persistence:
    enabled: true
    size: "20Gi"
    storageClass: gp3

# ── Redis Cluster ─────────────────────────────────────────────────
redis:
  cluster:
    enabled: true
    masterCount: 3
    replicaCount: 3
    image:
      repository: redis
      tag: "7.2-alpine"
  auth:
    existingSecret: redis-password
  ports:
    client: 6379
    bus: 16379
    metrics: 9121
  resources:
    requests:
      cpu: "250m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "4Gi"
  persistence:
    enabled: true
    size: "10Gi"
    storageClass: gp3
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# ── Blockchain Nodes ──────────────────────────────────────────────
blockchainNodes:
  ethereum:
    enabled: true
    client: erigon
    replicas: 2
    network: mainnet
    dataDir: /data/ethereum
    image:
      repository: thorax/erigon
      tag: "latest"
    resources:
      requests:
        cpu: "4000m"
        memory: "16Gi"
      limits:
        cpu: "8000m"
        memory: "32Gi"
    persistence:
      enabled: true
      size: "2Ti"
      storageClass: gp3-io2
      accessModes: ["ReadWriteOnce"]
    ports:
      rpc: 8545
      ws: 8546
      metrics: 6060
      p2p: 30303
    args:
      - "--chain=mainnet"
      - "--http"
      - "--http.addr=0.0.0.0"
      - "--http.port=8545"
      - "--http.api=eth,net,web3,txpool,debug"
      - "--ws"
      - "--ws.addr=0.0.0.0"
      - "--ws.port=8546"
      - "--metrics"
      - "--metrics.addr=0.0.0.0"
      - "--metrics.port=6060"
      - "--txpool.globalslots=50000"
      - "--batchsize=128mb"
      - "--db.pagesize=4096"
  polygon:
    enabled: true
    client: erigon
    replicas: 1
    network: polygon-mainnet
    dataDir: /data/polygon
    image:
      repository: thorax/erigon
      tag: "latest"
    resources:
      requests:
        cpu: "4000m"
        memory: "16Gi"
      limits:
        cpu: "8000m"
        memory: "32Gi"
    persistence:
      enabled: true
      size: "2Ti"
      storageClass: gp3-io2
      accessModes: ["ReadWriteOnce"]
    ports:
      rpc: 8545
      ws: 8546
      metrics: 6060
      p2p: 30303
  solana:
    enabled: false
    client: solana-validator
    replicas: 1
    network: mainnet-beta
    image:
      repository: solanalabs/solana
      tag: "latest"
    resources:
      requests:
        cpu: "8000m"
        memory: "32Gi"
      limits:
        cpu: "16000m"
        memory: "64Gi"
    persistence:
      enabled: true
      size: "4Ti"
      storageClass: gp3-io2

# ── Push Server ───────────────────────────────────────────────────
pushServer:
  replicaCount: 2
  image:
    repository: push-server
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  ports:
    http: 3000
    metrics: 9090
  env:
    RUST_LOG: "info,push_server=debug"
    NATS_URL: "nats://nats-cluster:4222"
    REDIS_URL: "redis://redis-cluster:6379"
  envFromSecrets:
    - name: push-apns
      keys: [apns-key-p8, apns-cert]
    - name: push-fcm
      keys: [fcm-credentials-json]
  service:
    type: ClusterIP
    port: 3000
  livenessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ── Keys Server ───────────────────────────────────────────────────
keysServer:
  replicaCount: 2
  image:
    repository: keys-server
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  ports:
    http: 3001
    metrics: 9090
  env:
    RUST_LOG: "info,keys_server=debug"
    DATABASE_MAX_CONNECTIONS: "10"
  envFromSecrets:
    - name: keys-db
      keys: [database-url]
    - name: keys-encryption
      keys: [master-key]
  service:
    type: ClusterIP
    port: 3001
  livenessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    path: /v1/health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

# ── Bundler (ERC-4337) ────────────────────────────────────────────
bundler:
  replicaCount: 2
  image:
    repository: bundler
    pullPolicy: IfNotPresent
    tag: "1.0.0"
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  ports:
    http: 4337
    metrics: 9090
  env:
    RUST_LOG: "info,bundler=debug"
    ENTRY_POINT_ADDRESS: "0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789"
    CHAIN_ID: "1"
    RPC_URL: "http://rpc-proxy:8545"
    MAX_OPS_PER_BUNDLE: "4"
  envFromSecrets:
    - name: bundler-wallet
      keys: [private-key]
  service:
    type: ClusterIP
    port: 4337
  livenessProbe:
    path: /health
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readinessProbe:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 3

# ── Monitoring ────────────────────────────────────────────────────
monitoring:
  prometheus:
    enabled: true
    retention: "30d"
    storageSize: "500Gi"
    storageClass: gp3
    image:
      repository: prom/prometheus
      tag: "v2.51.0"
    resources:
      requests:
        cpu: "1000m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
  grafana:
    enabled: true
    adminPasswordSecret: grafana-admin
    image:
      repository: grafana/grafana
      tag: "10.4.0"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    persistence:
      enabled: true
      size: "10Gi"
      storageClass: gp3
    dashboards:
      enabled: true
  alertmanager:
    enabled: true
    image:
      repository: prom/alertmanager
      tag: "v0.27.0"
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    config:
      receivers:
        - name: slack
          slack_configs:
            - channel: "#cinacoin-alerts"
        - name: pagerduty
          pagerduty_configs:
            - service_key: "PD_SERVICE_KEY"
