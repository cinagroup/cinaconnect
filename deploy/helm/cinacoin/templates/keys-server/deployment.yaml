apiVersion: apps/v1
kind: Deployment
metadata:
  name: keys-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: keys-server
    component: keys
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keysServer.replicaCount }}
  selector:
    matchLabels:
      app: keys-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: keys-server
        component: keys
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.keysServer.ports.metrics }}"
        prometheus.io/path: "/v1/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 45
      containers:
        - name: keys-server
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.keysServer.image.repository }}:{{ .Values.keysServer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.keysServer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.keysServer.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.keysServer.ports.metrics }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.keysServer.env.RUST_LOG | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: keys-db
                  key: database-url
            - name: DATABASE_MAX_CONNECTIONS
              value: {{ .Values.keysServer.env.DATABASE_MAX_CONNECTIONS | quote }}
            - name: ENCRYPTION_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: keys-encryption
                  key: key-id
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
          {{- with .Values.keysServer.envFromSecrets }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- end }}
          {{- with .Values.keysServer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.keysServer.livenessProbe.path }}
              port: {{ .Values.keysServer.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.keysServer.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.keysServer.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.keysServer.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.keysServer.readinessProbe.path }}
              port: {{ .Values.keysServer.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.keysServer.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.keysServer.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.keysServer.readinessProbe.failureThreshold }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
