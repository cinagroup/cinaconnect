{{- if .Values.relay.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: relay-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: relay-server
    {{- include "cinacoin.labels" . | nindent 4 }}
  {{- with .Values.relay.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.relay.ingress.className }}
  {{- if .Values.relay.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.relay.ingress.host | quote }}
      secretName: {{ .Values.relay.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.relay.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: relay-server
                port:
                  name: ws
{{- end }}
