apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: relay-server
    component: core
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.relay.replicaCount }}
  selector:
    matchLabels:
      app: relay-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: relay-server
        component: core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.relay.ports.metrics }}"
        prometheus.io/path: "/v1/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: {{ .Values.relay.topologySpread.maxSkew }}
          topologyKey: {{ .Values.relay.topologySpread.topologyKey }}
          whenUnsatisfiable: {{ .Values.relay.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app: relay-server
      terminationGracePeriodSeconds: 60
      containers:
        - name: relay
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.relay.image.repository }}:{{ .Values.relay.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.relay.image.pullPolicy }}
          ports:
            - name: ws
              containerPort: {{ .Values.relay.ports.ws }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.relay.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.relay.ports.metrics }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.relay.env.RUST_LOG | quote }}
            - name: NATS_URL
              value: {{ .Values.relay.env.NATS_URL | quote }}
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
          {{- with .Values.relay.envFromSecrets }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- end }}
          {{- with .Values.relay.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.relay.livenessProbe.path }}
              port: {{ .Values.relay.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.relay.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.relay.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.relay.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.relay.readinessProbe.path }}
              port: {{ .Values.relay.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.relay.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.relay.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.relay.readinessProbe.failureThreshold }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.relay.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: relay-server
                topologyKey: {{ .Values.relay.podAntiAffinity.topologyKey }}
