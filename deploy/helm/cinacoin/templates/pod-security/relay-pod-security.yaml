apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: relay-server-pod-security
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
    component: pod-security
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: relay-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relay-server
    spec:
      # Pod Security Standards - Restricted
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: relay-server
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "500m"
              memory: "256Mi"
