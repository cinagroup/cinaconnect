apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: nats
    component: messaging
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  serviceName: nats-cluster
  replicas: {{ .Values.nats.cluster.replicas }}
  selector:
    matchLabels:
      app: nats
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: nats
        component: messaging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.nats.ports.monitor }}"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: nats
          image: "{{ .Values.nats.cluster.image.repository }}:{{ .Values.nats.cluster.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --js
            - -m
            - "{{ .Values.nats.ports.monitor }}"
            - --cluster
            - nats://0.0.0.0:{{ .Values.nats.ports.cluster }}
            - --routes
            {{- range $i := until (int .Values.nats.cluster.replicas) }}
            - nats://nats-cluster-{{ $i }}.nats-cluster.{{ $.Release.Namespace }}.svc:{{ $.Values.nats.ports.cluster }}
            {{- end }}
            {{- if .Values.nats.jetstream.enabled }}
            - --jetstream
            - --store_dir
            - /data/nats
            {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.nats.ports.client }}
              protocol: TCP
            - name: cluster
              containerPort: {{ .Values.nats.ports.cluster }}
              protocol: TCP
            - name: monitor
              containerPort: {{ .Values.nats.ports.monitor }}
              protocol: TCP
          {{- with .Values.nats.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nats-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.nats.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.nats.persistence.size }}
