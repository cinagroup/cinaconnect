apiVersion: apps/v1
kind: Deployment
metadata:
  name: bundler
  namespace: {{ .Release.Namespace }}
  labels:
    app: bundler
    component: bundler
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.bundler.replicaCount }}
  selector:
    matchLabels:
      app: bundler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bundler
        component: bundler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.bundler.ports.metrics }}"
        prometheus.io/path: "/v1/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: bundler
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.bundler.image.repository }}:{{ .Values.bundler.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.bundler.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.bundler.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.bundler.ports.metrics }}
              protocol: TCP
          env:
            - name: RUST_LOG
              value: {{ .Values.bundler.env.RUST_LOG | quote }}
            - name: ENTRY_POINT_ADDRESS
              value: {{ .Values.bundler.env.ENTRY_POINT_ADDRESS | quote }}
            - name: CHAIN_ID
              value: {{ .Values.bundler.env.CHAIN_ID | quote }}
            - name: RPC_URL
              value: {{ .Values.bundler.env.RPC_URL | quote }}
            - name: BUNDLER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: bundler-wallet
                  key: private-key
            - name: MAX_OPS_PER_BUNDLE
              value: {{ .Values.bundler.env.MAX_OPS_PER_BUNDLE | quote }}
          {{- with .Values.bundler.envFromSecrets }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          {{- end }}
          {{- with .Values.bundler.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.bundler.livenessProbe.path }}
              port: {{ .Values.bundler.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.bundler.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bundler.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.bundler.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.bundler.readinessProbe.path }}
              port: {{ .Values.bundler.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.bundler.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bundler.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.bundler.readinessProbe.failureThreshold }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
