apiVersion: v1
kind: Service
metadata:
  name: bundler
  namespace: {{ .Release.Namespace }}
  labels:
    app: bundler
    component: bundler
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  type: {{ .Values.bundler.service.type }}
  ports:
    - name: http
      port: {{ .Values.bundler.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.bundler.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    app: bundler
