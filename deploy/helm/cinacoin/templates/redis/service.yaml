apiVersion: v1
kind: Service
metadata:
  name: redis-cluster
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
    component: cache
    {{- include "cinacoin.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: client
      port: {{ .Values.redis.ports.client }}
      targetPort: client
      protocol: TCP
    - name: bus
      port: {{ .Values.redis.ports.bus }}
      targetPort: bus
      protocol: TCP
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
    component: cache
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: client
      port: {{ .Values.redis.ports.client }}
      targetPort: client
      protocol: TCP
    - name: bus
      port: {{ .Values.redis.ports.bus }}
      targetPort: bus
      protocol: TCP
  selector:
    app: redis
