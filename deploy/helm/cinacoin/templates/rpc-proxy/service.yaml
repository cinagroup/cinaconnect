apiVersion: v1
kind: Service
metadata:
  name: rpc-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: rpc-proxy
    component: proxy
    {{- include "cinacoin.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.rpcProxy.ports.metrics }}"
spec:
  type: {{ .Values.rpcProxy.service.type }}
  ports:
    - name: http
      port: {{ .Values.rpcProxy.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.rpcProxy.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    app: rpc-proxy
