# Cinacoin — Kubernetes Secrets Management Template
# ⚠️ DO NOT store actual secret values here!
# Use Sealed Secrets, External Secrets Operator, or cloud KMS integration.
#
# This template shows the structure for required secrets.
# Actual values should be provided by:
#   - External Secrets Operator (AWS Secrets Manager / GCP Secret Manager)
#   - Sealed Secrets (Bitnami)
#   - Vault Agent Injector
#   - Manual kubectl creation for development only
#
# Example with External Secrets Operator:
#   apiVersion: external-secrets.io/v1beta1
#   kind: ExternalSecret
#   spec:
#     secretStoreRef:
#       name: aws-secrets-manager
#       kind: ClusterSecretStore
#     target:
#       name: cinacoin-secrets
#     dataFrom:
#       - extract:
#           key: cinacoin/production
---
apiVersion: v1
kind: Secret
metadata:
  name: cinacoin-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
    component: secrets
type: Opaque
data:
  # Base64-encoded placeholder values — REPLACE with real secrets
  # Use: echo -n "your-value" | base64
  redis-password: cmVkaXMtcGFzc3dvcmQ=
  database-url: cG9zdGdyZXM6Ly91c2VyOnBhc3NAaG9zdDo1NDMyL29uY2hhaW51eA==
  jwt-secret: UkVRVUlSRV9KVFdfU0VDUkVUX1BST1ZJREVE
  # ^ Base64 of "REQUIRE_JWT_SECRET_PROVIDED" — placeholder only
  encryption-key: ZGVmYXVsdC1lbmNyeXB0aW9uLWtleS1yZXBsYWNlLWluLXByb2R1Y3Rpb24=
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  url: cmVkaXM6Ly86cmVkaXMtcGFzc3dvcmRAcmVkaXMtY2x1c3Rlcjo2Mzc5
---
apiVersion: v1
kind: Secret
metadata:
  name: provider-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  alchemy: YWxjaGVteS1rZXk=
  infura: aW5mdXJhLWtleQ==
  ankr: YW5rci1rZXk=
---
apiVersion: v1
kind: Secret
metadata:
  name: push-apns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  apns-key-p8: YXBucy1rZXktcDg=
  apns-cert: YXBucy1jZXJ0
---
apiVersion: v1
kind: Secret
metadata:
  name: push-fcm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  fcm-credentials-json: ZmNtLWNyZWRz
---
apiVersion: v1
kind: Secret
metadata:
  name: keys-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: cG9zdGdyZXM6Ly9rZXlzOnBhc3NAaG9zdDo1NDMyL2tleXM=
---
apiVersion: v1
kind: Secret
metadata:
  name: keys-encryption
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  master-key: bWFzdGVyLWtleQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: bundler-wallet
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  private-key: YnVuZGxlci1wcml2YXRlLWtleQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password: Z3JhZmFuYS1hZG1pbg==
