# Alertmanager values for helm install
# Usage: helm install alertmanager prometheus/alertmanager -f this-file
config:
  global:
    resolve_timeout: 5m
    slack_api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

  route:
    receiver: default-receiver
    group_by:
      - alertname
      - region
      - namespace
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - match:
          severity: critical
        receiver: pagerduty
        continue: true
      - match:
          severity: warning
        receiver: slack

  receivers:
    - name: default-receiver
      slack_configs:
        - channel: "#cinacoin-alerts"
          send_resolved: true
          title: "{{ `{{ .GroupLabels.alertname }}` }}"
          text: "{{ `{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}` }}"

    - name: pagerduty
      pagerduty_configs:
        - service_key: "PD_SERVICE_KEY"
          severity: "{{ `{{ .CommonLabels.severity }}` }}"
          description: "{{ `{{ .CommonAnnotations.summary }}` }}"

  templates:
    - '/etc/alertmanager/*.tmpl'
