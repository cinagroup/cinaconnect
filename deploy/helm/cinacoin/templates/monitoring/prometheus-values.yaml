# Prometheus values for helm install
# Usage: helm install prometheus prometheus-community/kube-prometheus-stack -f this-file
server:
  retention: "30d"
  persistentVolume:
    enabled: true
    size: "500Gi"
    storageClass: gp3
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

prometheus:
  prometheusSpec:
    replicas: 1
    retention: "30d"
    resources:
      requests:
        cpu: "1000m"
        memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: "relay-server"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cinacoin
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: relay-server
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: "([0-9]+)"
            target_label: __metrics_path__
            replacement: /v1/metrics
            action: replace
      - job_name: "rpc-proxy"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cinacoin
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: rpc-proxy
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
      - job_name: "blockchain-nodes"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - cinacoin
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: erigon-ethereum|erigon-polygon
            action: keep

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default-receiver
      group_by:
        - alertname
        - region
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: pagerduty
          continue: true
        - match:
            severity: warning
          receiver: slack
    receivers:
      - name: default-receiver
        slack_configs:
          - channel: "#cinacoin-alerts"
            send_resolved: true
            title: "{{ `{{ .GroupLabels.alertname }}` }}"
            text: "{{ `{{ range .Alerts }}{{ .Annotations.summary }}\\n{{ .Annotations.description }}\\n{{ end }}` }}"
      - name: pagerduty
        pagerduty_configs:
          - service_key: "PD_SERVICE_KEY"
            severity: "{{ `{{ .CommonLabels.severity }}` }}"
            description: "{{ `{{ .CommonAnnotations.summary }}` }}"
