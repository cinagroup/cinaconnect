# Grafana values for helm install
# Usage: helm install grafana grafana/grafana -f this-file
admin:
  existingSecret: grafana-admin
  passwordKey: admin-password

persistence:
  enabled: true
  size: "10Gi"
  storageClass: gp3

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

env:
  GF_SERVER_ROOT_URL: "https://grafana.cinacoin.com"
  GF_SECURITY_ADMIN_USER: admin
  GF_AUTH_ANONYMOUS_ENABLED: "false"

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.cinacoin.svc:9090
        isDefault: true
        editable: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: cinacoin
        orgId: 1
        folder: Cinacoin
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

dashboards:
  cinacoin:
    relay-dashboard:
      json:
        dashboard:
          title: "Relay Metrics"
          uid: relay-metrics
          panels: []
    rpc-dashboard:
      json:
        dashboard:
          title: "RPC Proxy Metrics"
          uid: rpc-metrics
          panels: []
    cost-dashboard:
      json:
        dashboard:
          title: "Cost Tracking"
          uid: cost-tracking
          panels: []
