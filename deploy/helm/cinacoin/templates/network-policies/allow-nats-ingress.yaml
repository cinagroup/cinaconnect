apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nats-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: relay
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: push-server
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: bundler
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 6222
