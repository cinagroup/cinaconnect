apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rpc-proxy-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cinacoin.labels" . | nindent 4 }}
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rpc-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: relay
      ports:
        - protocol: TCP
          port: 8545
        - protocol: TCP
          port: 9090
