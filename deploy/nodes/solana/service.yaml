apiVersion: v1
kind: Service
metadata:
  name: solana-validator
  namespace: cinacoin
  labels:
    app: solana-validator
    chain: solana
    component: blockchain-node
spec:
  type: ClusterIP
  ports:
    - name: rpc
      port: 8899
      targetPort: rpc
      protocol: TCP
    - name: ws
      port: 8900
      targetPort: ws
      protocol: TCP
  selector:
    app: solana-validator
