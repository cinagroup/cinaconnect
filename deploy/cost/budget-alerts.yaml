# GCP Budget Alert Template
# Usage: gcloud beta billing budgets create --display-name="Cinacoin Monthly Budget" \
#   --budget-amount=7000 --threshold-rule=percent=50,type=forecasted-spend \
#   --threshold-rule=percent=80,type=forecasted-spend \
#   --threshold-rule=percent=100,type=actual-spend \
#   --projects=cinacoin-prod --notification-emails=ops@cinacoin.com

budget:
  amount:
    currencyCode: USD
    units: "7000"
  displayName: Cinacoin Monthly Budget
  budgetFilter:
    projects:
      - projects/cinacoin-prod
  thresholdRules:
    - thresholdPercent: 0.5
      spendBasis: FORECASTED_SPEND
    - thresholdPercent: 0.8
      spendBasis: FORECASTED_SPEND
    - thresholdPercent: 1.0
      spendBasis: ACTUAL_SPEND

---
# AWS Budget Alert Template
# Usage: aws budgets create-budget --cli-input-json file://aws-budget.json

awsBudget:
  BudgetName: cinacoin-monthly-budget
  BudgetType: COST
  TimeUnit: MONTHLY
  BudgetLimit:
    Amount: "7000"
    Unit: USD
  CostFilters:
    TagKeyValue:
      - "user:Project$cinacoin"
  Notifications:
    - NotificationType: ACTUAL
      ComparisonOperator: GREATER_THAN
      Threshold: 80
      ThresholdType: PERCENTAGE
    - NotificationType: FORECASTED
      ComparisonOperator: GREATER_THAN
      Threshold: 100
      ThresholdType: PERCENTAGE
