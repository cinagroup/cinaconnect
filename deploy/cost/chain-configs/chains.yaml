# Cinacoin Chain Registry
# Priority matrix and configuration for all supported chains

chains:
  # ── Ethereum Mainnet (P0) ─────────────────────────────────────
  - id: 1
    name: Ethereum
    symbol: ETH
    type: evm
    rpc_url: "https://rpc.cinacoin.com/eth"
    ws_url: "wss://rpc.cinacoin.com/eth/ws"
    explorer: "https://etherscan.io"
    explorer_tx: "https://etherscan.io/tx/{hash}"
    native_currency:
      name: Ether
      symbol: ETH
      decimals: 18
    block_time_ms: 12000
    gas_config:
      type: eip1559
      default_priority_fee: "1500000000"  # 1.5 gwei
      max_fee_multiplier: 1.5
    supported: true
    priority: P0

