# Cinacoin — SSL/TLS Configuration
# Production-grade TLS settings for all ingress points
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@cinacoin.com
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@cinacoin.com
    privateKeySecretRef:
      name: letsencrypt-staging-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Certificate for production domains
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cinacoin-wildcard
  namespace: cinacoin
spec:
  secretName: cinacoin-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "*.cinacoin.com"
  dnsNames:
    - cinacoin.com
    - "*.cinacoin.com"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - digital signature
    - key encipherment
---
# Certificate for internal services
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cinacoin-internal
  namespace: cinacoin
spec:
  secretName: cinacoin-internal-tls
  issuerRef:
    name: cinacoin-ca
    kind: ClusterIssuer
  commonName: "*.cinacoin.svc.cluster.local"
  dnsNames:
    - "*.cinacoin.svc.cluster.local"
    - "*.cinacoin.svc"
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
