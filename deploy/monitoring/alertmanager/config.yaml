global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"

route:
  receiver: default-receiver
  group_by:
    - alertname
    - region
    - namespace
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: pagerduty
      continue: true
    - match:
        severity: warning
      receiver: slack

receivers:
  - name: default-receiver
    slack_configs:
      - channel: "#cinacoin-alerts"
        send_resolved: true

  - name: slack
    slack_configs:
      - channel: "#cinacoin-alerts"
        send_resolved: true

  - name: pagerduty
    pagerduty_configs:
      - service_key: "PD_SERVICE_KEY"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - region
