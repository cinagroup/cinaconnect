apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: relay-alerts
  namespace: cinacoin
  labels:
    app: prometheus
    component: alerting-rules
    role: alert-rules
spec:
  groups:
    - name: relay-alerts
      rules:
        - alert: HighRelayLatency
          expr: |
            histogram_quantile(0.99, sum(rate(relay_message_duration_seconds_bucket[5m])) by (le, region)) > 0.5
          for: 5m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "Relay P99 延迟 > 500ms"
            description: "Region {{ $labels.region }} 的 Relay 消息延迟 P99 为 {{ $value }}s"

        - alert: CriticalRelayLatency
          expr: |
            histogram_quantile(0.99, sum(rate(relay_message_duration_seconds_bucket[5m])) by (le, region)) > 1.0
          for: 2m
          labels:
            severity: critical
            team: cinacoin
          annotations:
            summary: "Relay P99 延迟 > 1s (Critical)"
            description: "Region {{ $labels.region }} 的 Relay 消息延迟 P99 为 {{ $value }}s"

        - alert: RelayConnectionSpike
          expr: rate(relay_connections_total[5m]) > 100
          for: 2m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "Relay 连接数激增"
            description: "Region {{ $labels.region }} 连接速率: {{ $value }}/s"

        - alert: RelayPodCrash
          expr: |
            increase(kube_pod_container_status_restarts_total{container="relay"}[15m]) > 0
          for: 1m
          labels:
            severity: critical
            team: cinacoin
          annotations:
            summary: "Relay Pod 重启"
            description: "Pod {{ $labels.pod }} 在 15 分钟内重启"

        - alert: NATSClusterDown
          expr: |
            nats_server_connections == 0
          for: 1m
          labels:
            severity: critical
            team: cinacoin
          annotations:
            summary: "NATS 集群不可用"
            description: "NATS 连接数为 0"

        - alert: RelayActiveConnectionsHigh
          expr: |
            sum(relay_active_connections) by (region) > 80000
          for: 5m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "Relay 活跃连接数过高"
            description: "Region {{ $labels.region }}: {{ $value }} 活跃连接"

        - alert: RelayHPAScalingMaxed
          expr: |
            kube_horizontalpodautoscaler_status_current_replicas{horizontalpodautoscaler="relay-server"} >= kube_horizontalpodautoscaler_spec_max_replicas{horizontalpodautoscaler="relay-server"}
          for: 10m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "Relay HPA 达到最大副本"
            description: "Relay 已达到最大副本数 {{ $value }}"
