apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-alerts
  namespace: cinacoin
  labels:
    app: prometheus
    component: alerting-rules
    role: alert-rules
spec:
  groups:
    - name: node-alerts
      rules:
        - alert: NodeSyncLagging
          expr: node_sync_status == 0
          for: 5m
          labels:
            severity: critical
            team: cinacoin
          annotations:
            summary: "区块链节点不同步"
            description: "{{ $labels.chain }} 在 {{ $labels.region }} 不同步"

        - alert: NodeLowPeers
          expr: node_peer_count < 10
          for: 10m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "区块链节点 P2P 连接数过低"
            description: "{{ $labels.chain }} 在 {{ $labels.region }} 仅有 {{ $value }} 个 P2P 连接"

        - alert: NodeDiskFull
          expr: |
            kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.1
          for: 5m
          labels:
            severity: critical
            team: cinacoin
          annotations:
            summary: "节点磁盘使用率 > 90%"
            description: "PVC {{ $labels.persistentvolumeclaim }} 仅剩 {{ $value | humanizePercentage }} 可用"

        - alert: NodeBlockHeightStalled
          expr: |
            increase(node_block_height[10m]) == 0
          for: 10m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "区块高度停滞"
            description: "{{ $labels.chain }} 在 {{ $labels.region }} 区块高度 10 分钟未变化"

        - alert: NodeHighMemoryUsage
          expr: |
            container_memory_usage_bytes{container="erigon"} / container_spec_memory_limit_bytes{container="erigon"} > 0.9
          for: 5m
          labels:
            severity: warning
            team: cinacoin
          annotations:
            summary: "Erigon 节点内存使用率 > 90%"
            description: "Pod {{ $labels.pod }} 内存使用率 {{ $value | humanizePercentage }}"
