# OpenTelemetry Collector Configuration
# Collects traces from all Cinacoin services → Jaeger
# Collects logs → Loki
# Collects metrics → Prometheus

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1000

  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 1s

  probabilistic_sampler:
    sampling_percentage: 10  # 10% sampling in production

  attributes:
    actions:
      - key: service.namespace
        value: cinacoin
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert

exporters:
  jaeger:
    endpoint: jaeger-collector:14250
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: cinacoin

  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, probabilistic_sampler, batch]
      exporters: [jaeger, logging]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, logging]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, logging]

  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
