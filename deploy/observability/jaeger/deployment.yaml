apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: cinacoin
  labels:
    app: jaeger
    component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: jaeger
        component: tracing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.55
          args:
            - "--memory.max-traces=50000"
            - "--query.base-path=/jaeger"
            - "--collector.otlp.grpc.host-port=:4317"
            - "--collector.otlp.http.host-port=:4318"
          ports:
            - name: grpc
              containerPort: 14250
              protocol: TCP
            - name: http
              containerPort: 16686
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: collector-http
              containerPort: 14268
              protocol: TCP
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: METRICS_STORAGE_TYPE
              value: "prometheus"
            - name: PROMETHEUS_SERVER_URL
              value: "http://prometheus-server:9090"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: cinacoin
  labels:
    app: jaeger
    component: tracing
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 14250
      targetPort: grpc
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
  selector:
    app: jaeger
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: cinacoin
  labels:
    app: jaeger
    component: tracing
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: http
      protocol: TCP
  selector:
    app: jaeger
